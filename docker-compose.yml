services:
  postgres:
    image: postgres:16-alpine
    container_name: freeway-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: freeway
    ports:
      # Host 5433 to avoid clashing with a local Postgres on 5432.
      - "5433:5432"
    volumes:
      - bc_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: freeway-redis
    ports:
      - "6379:6379"

volumes:
  bc_pgdata:
